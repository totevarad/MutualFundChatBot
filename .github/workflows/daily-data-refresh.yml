name: Daily Data Refresh

on:
  schedule:
    - cron: '45 3 * * *'  # 3:45 AM UTC = 9:15 AM IST
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  ingest-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install groq  # Required for Mem0

      - name: Run Data Ingestion Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m src.ingestion.run_pipeline

      - name: Validate Vectorstore
        run: |
          python -m src.ingestion.validate

      - name: Package Vectorstore
        run: |
          python -m src.ingestion.deploy_vectorstore

      - name: Upload Vectorstore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectorstore-backup
          path: vectorstore_backup.zip
          retention-days: 7
